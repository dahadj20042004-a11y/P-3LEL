name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - os: java/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '12.x'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0' # تأكد من إصدار فلاتر الخاص بك إذا لزم الأمر
          
      - run: flutter pub get
      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
