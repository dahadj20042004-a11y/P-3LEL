name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11' # هاد النسخة تمشي مع فلاتر القديم

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' # هادي هي النسخة اللي راح تحل المشكل
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        # هاد السطر يفرض البناء بلا ما يحوس على Null Safety اللي راه حابسنا
        run: flutter build apk --release --no-sound-null-safety
