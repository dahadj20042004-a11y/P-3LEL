اوname: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'

      - name: Force Get Dependencies
        # استعملنا هاد الأمر لتجاوز أي تعارض في المكتبات
        run: flutter pub get --supress-analytics

      - name: Clean & Build
        # أمر التنظيف مهم جداً لمسح أثار المحاولات الفاشلة السابقة
        run: |
          flutter clean
          flutter build apk --release --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-LawnMower-APK
          path: build/app/outputs/flutter-apk/app-release.apk
