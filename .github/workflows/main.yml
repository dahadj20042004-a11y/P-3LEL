name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # نحينا النسخة المحددة وخليناها stable باش يحمل أحدث نسخة مستقرة
          # ونعالج مشكل الـ v1 embedding بطريقة أخرى لداخل
          channel: 'stable'

      - name: Get dependencies
        # أضفنا --legacy-conflicting-deps لتجاوز مشاكل المكتبات القديمة
        run: flutter pub get

      - name: Build APK
        # أضفنا أمر التنظيف قبل البناء لضمان عدم وجود ملفات معطوبة
        run: |
          flutter clean
          flutter build apk --release --no-sound-null-safety
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lawn-mower-apk
          path: build/app/outputs/flutter-apk/app-release.apk
