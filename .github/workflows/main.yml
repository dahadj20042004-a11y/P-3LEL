name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11' # استعملنا النسخة 11 لتوافق أفضل مع المشاريع القديمة

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' # حددنا نسخة قديمة تدعم الـ v1 embedding تاع مشروعك
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-sound-null-safety # أضفنا هاد الأمر لتجاوز مشاكل التوافق

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lawn-mower-apk
          path: build/app/outputs/flutter-apk/app-release.apk
